<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1976d2" />
    <meta name="description" content="ViandeEnDirect - Plateforme de vente directe de viande" />
    
    <!-- Primary Meta Tags -->
    <title>ViandeEnDirect</title>
    <meta name="title" content="ViandeEnDirect" />
    
    <!-- Open Graph / Social Media Meta Tags -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://viandeendirect.fr/" />
    <meta property="og:title" content="ViandeEnDirect" />
    <meta property="og:description" content="Plateforme de vente directe de viande entre producteurs et consommateurs" />
    <meta property="og:image" content="https://viandeendirect.fr/logo512.png" />
    
    <!-- Twitter Meta Tags -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://viandeendirect.fr/" />
    <meta property="twitter:title" content="ViandeEnDirect" />
    <meta property="twitter:description" content="Plateforme de vente directe de viande entre producteurs et consommateurs" />
    <meta property="twitter:image" content="https://viandeendirect.fr/logo512.png" />
    
    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" href="/logo192.png" />
    
    <!-- Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />
    
    <!-- Preload key fonts and assets -->
    <link rel="preload" href="/fonts/Roboto-Regular.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/Roboto-Medium.woff2" as="font" type="font/woff2" crossorigin />
    
    <!-- Vite HMR -->
    <% if (import.meta.env.DEV) { %>
    <script type="module">
      import RefreshRuntime from '/@react-refresh'
      RefreshRuntime.injectIntoGlobalHook(window)
      window.$RefreshReg$ = () => {}
      window.$RefreshSig$ = () => (type) => type
      window.__vite_plugin_react_preamble_installed__ = true
    </script>
    <% } %>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    
    <!-- Load the app -->
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
